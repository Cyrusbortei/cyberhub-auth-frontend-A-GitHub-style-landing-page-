<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberHub - Build Better</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f6f8fa;
    --text: #24292f;
    --text-secondary: #57606a;
    --border: #d0d7de;
    --accent: #2da44e;
    --accent-hover: #2c974b;
    --nav-bg: #ffffff;
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --text: #c9d1d9;
    --text-secondary: #8d96a0;
    --border: #30363d;
    --accent: #238636;
    --accent-hover: #2ea043;
    --nav-bg: #161b22;
  }

  [data-theme="blue"] {
    --bg: #0a192f;
    --bg-secondary: #112240;
    --text: #ccd6f6;
    --text-secondary: #8892b0;
    --border: #233554;
    --accent: #64ffda;
    --accent-hover: #52d1b8;
    --nav-bg: #112240;
  }

    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    transition: background 0.2s, color 0.2s;
  }

  body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--nav-bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 5%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

 .nav-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

 .logo {
    font-size: 24px;
    font-weight: 700;
  }

  nav a {
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 8px;
  }

  nav a:hover {
    color: var(--accent);
  }

 .search-box {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text);
    width: 200px;
  }

 .nav-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }

 .btn {
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
    font-size: 14px;
  }

 .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
  }

 .btn-primary:hover {
    background: var(--accent-hover);
  }

 .hero {
    text-align: center;
    padding: 80px 20px;
    background: var(--bg-secondary);
  }

 .hero h1 {
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 16px;
  }

 .hero p {
    font-size: 20px;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

 .hero-img {
    max-width: 600px;
    width: 90%;
    margin: 40px auto 0;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  /* Modal */
 .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

 .modal-content {
    background: var(--bg);
    padding: 32px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    border: 1px solid var(--border);
  }

 .modal-content h2 {
    margin-bottom: 20px;
    text-align: center;
  }

 .modal input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text);
  }

 .divider {
    text-align: center;
    margin: 16px 0;
    color: var(--text-secondary);
    position: relative;
  }

 .divider::before,
 .divider::after {
    content: "";
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: var(--border);
  }

 .divider::before { left: 0; }
 .divider::after { right: 0; }

 .social-btn {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 500;
  }

 .social-btn:hover {
    background: var(--bg);
  }

 .tab-switch {
    display: flex;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

 .tab-switch button {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-weight: 500;
  }

 .tab-switch button.active {
    color: var(--text);
    border-bottom: 2px solid var(--accent);
  }

 .close {
    float: right;
    font-size: 24px;
    cursor: pointer;
    color: var(--text-secondary);
  }

 .user-info {
    display: none;
    align-items: center;
    gap: 10px;
  }

 .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
  }

  /* Settings Panel */
 .settings-panel {
    position: fixed;
    right: -300px;
    top: 0;
    width: 300px;
    height: 100%;
    background: var(--nav-bg);
    border-left: 1px solid var(--border);
    padding: 24px;
    box-shadow: -4px 0 12px rgba(0,0,0,0.1);
    transition: right 0.3s;
    z-index: 1000;
  }

 .settings-panel.open {
    right: 0;
  }

 .theme-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    cursor: pointer;
  }

 .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 999;
  }

 .overlay.show {
    display: block;
  }

  #recaptcha-container {
    margin: 10px 0;
  }

  @media (max-width: 768px) {
   .hero h1 { font-size: 36px; }
    nav { display: none; }
   .search-box { width: 150px; }
  }
</style>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup,
    GoogleAuthProvider,
    signInWithPhoneNumber,
    RecaptchaVerifier,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  // PASTE YOUR FIREBASE CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  window.firebaseAuth = auth;
  window.googleProvider = googleProvider;
  window.firebaseFunctions = {
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signInWithPopup,
    signInWithPhoneNumber,
    RecaptchaVerifier,
    onAuthStateChanged,
    signOut
  };
</script>
</head>
<body>

<header>
  <div class="nav-left">
    <div class="logo">⚡ CyberHub</div>
    <nav>
      <a href="#">Product</a>
      <a href="#">Solutions</a>
      <a href="#">Resources</a>
      <a href="#">Open Source</a>
      <a href="#">Pricing</a>
    </nav>
    <input type="text" class="search-box" placeholder="Search or jump to...">
  </div>

  <div class="nav-right">
    <button class="btn" onclick="openSettings()">⚙️ Settings</button>

    <div id="authButtons">
      <button class="btn" onclick="openAuthModal('signin')">Sign in</button>
      <button class="btn btn-primary" onclick="openAuthModal('signup')">Sign up</button>
    </div>

    <div class="user-info" id="userInfo">
      <div class="user-avatar" id="userAvatar">U</div>
      <button class="btn" onclick="logout()">Logout</button>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Design Your Future</h1>
  <p>Build amazing websites with GSAP animation and modern tools.</p>
  <button class="btn btn-primary" style="padding: 12px 24px; font-size: 16px;">Get Started</button>
  <img src="hero.png" alt="Hero" class="hero-img">
</section>

<!-- Auth Modal -->
<div class="modal" id="authModal">
  <div class="modal-content">
    <span class="close" onclick="closeAuthModal()">&times;</span>

    <div class="tab-switch">
      <button id="tabSignin" class="active" onclick="switchTab('signin')">Sign In</button>
      <button id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <h2 id="authTitle">Sign In to CyberHub</h2>

    <button class="social-btn" onclick="loginWithGoogle()">
      🔵 Continue with Google
    </button>

    <button class="social-btn" onclick="showPhoneLogin()">
      📱 Continue with Phone
    </button>

    <div id="phoneSection" style="display:none;">
      <input type="tel" id="phoneNumber" placeholder="+234 801 234 5678">
      <div id="recaptcha-container"></div>
      <button class="btn btn-primary" style="width:100%;" onclick="sendOTP()">Send OTP</button>

      <div id="otpSection" style="display:none;">
        <input type="text" id="otpCode" placeholder="Enter OTP">
        <button class="btn btn-primary" style="width:100%;" onclick="verifyOTP()">Verify & Login</button>
      </div>
    </div>

    <div class="divider">or</div>

    <input type="email" id="email" placeholder="Email address">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-primary" style="width: 100%;" onclick="emailAuth()">Continue</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="overlay" id="overlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <h3>Appearance</h3>

  <div class="theme-option" onclick="setTheme('light')">
    <div style="width:20px;height:20px;border-radius:50%;background:#fff;border:1px solid #ccc;"></div>
    <div><strong>Light</strong><p style="font-size:12px;color:var(--text-secondary);">Clean and bright</p></div>
  </div>

  <div class="theme-option" onclick="setTheme('dark')">
    <div style="width:20px;height:20px;border-radius:50%;background:#0d1117;"></div>
    <div><strong>Dark</strong><p style="font-size:12px;color:var(--text-secondary);">Easy on the eyes</p></div>
  </div>

  <div class="theme-option" onclick="setTheme('blue')">
    <div style="width:20px;height:20px;border-radius:50%;background:#0a192f;"></div>
    <div><strong>Cyber Blue</strong><p style="font-size:12px;color:var(--text-secondary);">CyberHub signature</p></div>
  </div>
</div>

<script>
  // Theme handling
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  }

  function openSettings() {
    document.getElementById('settingsPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function closeSettings() {
    document.getElementById('settingsPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // Auth Modal handling
  let currentMode = 'signin';
  let confirmationResult = null;

  function openAuthModal(mode) {
    document.getElementById('authModal').style.display = 'flex';
    switchTab(mode);
  }

  function closeAuthModal() {
    document.getElementById('authModal').style.display = 'none';
    document.getElementById('phoneSection').style.display = 'none';
    document.getElementById('otpSection').style.display = 'none';
  }

  function switchTab(mode) {
    currentMode = mode;
    const isSignin = mode === 'signin';
    document.getElementById('tabSignin').classList.toggle('active', isSignin);
    document.getElementById('tabSignup').classList.toggle('active',!isSignin);
    document.getElementById('authTitle').innerText = isSignin? 'Sign In to CyberHub' : 'Create your account';
  }

  // Email/Password Auth
  async function emailAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { createUserWithEmailAndPassword, signInWithEmailAndPassword } = window.firebaseFunctions;
    const auth = window.firebaseAuth;

    if (!email ||!password) {
      alert('Please enter email and password');
      return;
    }

    try {
      if (currentMode === 'signup') {
        await createUserWithEmailAndPassword(auth, email, password);
        alert('Account created successfully!');
      } else {
        await signInWithEmailAndPassword(auth, email, password);
        alert('Logged in successfully!');
      }
      closeAuthModal();
    } catch (error) {
      alert(error.message);
    }
  }

  // Google Auth
  async function loginWithGoogle() {
    const { signInWithPopup } = window.firebaseFunctions;
    const auth = window.firebaseAuth;
    const provider = window.googleProvider;

    try {
      await signInWithPopup(auth, provider);
      alert('Logged in with Google!');
      closeAuthModal();
    } catch (error) {
      alert(error.message);
    }
  }

  // Phone Auth
  function showPhoneLogin() {
    document.getElementById('phoneSection').style.display = 'block';

    if (!window.recaptchaVerifier) {
      const { RecaptchaVerifier } = window.firebaseFunctions;
      window.recaptchaVerifier = new RecaptchaVerifier(window.firebaseAuth, 'recaptcha-container', {
        'size': 'normal',
        'callback': () => {}
      });
    }
  }

  async function sendOTP() {
    const phone = document.getElementById('phoneNumber').value;
    const { signInWithPhoneNumber } = window.firebaseFunctions;
    const auth = window.firebaseAuth;

    if (!phone) {
      alert('Enter phone number');
      return;
    }

    try {
      confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
      document.getElementById('otpSection').style.display = 'block';
      alert('OTP sent!');
    } catch (error) {
      alert(error.message);
    }
  }

  async function verifyOTP() {
    const otp = document.getElementById('otpCode').value;
    if (!otp) {
      alert('Enter OTP');
      return;
    }

    try {
      await confirmationResult.confirm(otp);
      alert('Phone login successful!');
      closeAuthModal();
    } catch (error) {
      alert('Invalid OTP');
    }
  }

  // Auth state listener
  window.addEventListener('load', () => {
    const { onAuthStateChanged } = window.firebaseFunctions;
    const auth = window.firebaseAuth;

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('authButtons').style.display = 'none';
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userAvatar').innerText = user.email? user.email[0].toUpperCase() : 'U';
      } else {
        document.getElementById('authButtons').style.display = 'flex';
        document.getElementById('userInfo').style.display = 'none';
      }
    });
  });

  async function logout() {
    const { signOut } = window.firebaseFunctions;
    await signOut(window.firebaseAuth);
    alert('Logged out');
  }

  // Close modal on outside click
  window.onclick = function(event) {
    if (event.target.id === 'authModal') closeAuthModal();
    if (event.target.id === 'overlay') closeSettings();
  }
</script>

</body>
</html>
